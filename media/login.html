<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caffetest - Test Automation Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary-blue: #4f46e5;
            --primary-purple: #7c3aed;
            --sky-blue: #0ea5e9;
            --sky-white: #f8fafc;
            --white: #ffffff;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --error-red: #ef4444;
            --success-green: #10b981;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: radial-gradient(ellipse at top left, rgba(79, 70, 229, 0.15) 0%, rgba(14, 165, 233, 0.1) 25%, rgba(124, 58, 237, 0.05) 50%, rgba(248, 250, 252, 1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-800);
            line-height: 1.6;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-xl);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }
        
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(79, 70, 229, 0.5), transparent);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-blue), var(--sky-blue));
            border-radius: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-lg);
            animation: logoFloat 3s ease-in-out infinite;
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }
        
        .logo svg {
            width: 36px;
            height: 36px;
            color: white;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: var(--gray-600);
            font-size: 16px;
            font-weight: 400;
            margin: 0;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--gray-700);
            font-size: 14px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            font-size: 16px;
            background-color: var(--white);
            color: var(--gray-800);
            transition: all 0.3s ease;
            outline: none;
        }
        
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            transform: translateY(-1px);
        }
        
        input[type="email"]:hover,
        input[type="password"]:hover {
            border-color: var(--gray-300);
        }
        
        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            transition: color 0.3s ease;
        }
        
        input:focus + .input-icon {
            color: var(--primary-blue);
        }
        
        .login-button {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--primary-blue), var(--sky-blue));
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 16px;
        }
        
        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .login-button:hover::before {
            left: 100%;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .login-button:active {
            transform: translateY(0);
        }
        
        .login-button:disabled {
            background: var(--gray-300);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .login-button:disabled::before {
            display: none;
        }
        
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid var(--white);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
            display: none;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .message {
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            margin-top: 16px;
            display: none;
            animation: messageSlide 0.3s ease-out;
        }
        
        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .error-message {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error-red);
        }
        
        .success-message {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success-green);
        }
        
        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--gray-200);
        }
        
        .footer p {
            color: var(--gray-500);
            font-size: 14px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .security-icon {
            color: var(--success-green);
        }
        
        /* Responsive design */
        @media (max-width: 480px) {
            body {
                padding: 16px;
            }
            
            .login-container {
                padding: 32px 24px;
            }
            
            h1 {
                font-size: 24px;
            }
        }
        
        /* Focus visible improvements */
        input:focus-visible,
        button:focus-visible {
            outline: 2px solid var(--primary-blue);
            outline-offset: 2px;
        }
        
        /* Loading state animation */
        .loading .login-button {
            pointer-events: none;
        }
        
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .floating-element {
            position: absolute;
            width: 6px;
            height: 6px;
            background: linear-gradient(45deg, var(--primary-blue), var(--sky-blue));
            border-radius: 50%;
            opacity: 0.6;
            animation: float 15s infinite linear;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="floating-elements" id="floating-elements"></div>
    
    <div class="login-container">
        <div class="logo-section">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 12L11 14L15 10M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>Caffetest</h1>
            <p class="subtitle">Test Automation Tracker</p>
        </div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" required autocomplete="email" placeholder="Enter your email">
                    <div class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 4H20C21.1 4 22 4.9 22 6V18C22 19.1 21.1 20 20 20H4C2.9 20 2 19.1 2 18V6C2 4.9 2.9 4 4 4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
                    <div class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M7 11V7A5 5 0 0 1 17 7V11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <button type="submit" id="login-button" class="login-button">
                    <span id="button-text">Sign In to Caffetest</span>
                    <div class="loader" id="loader"></div>
                </button>
            </div>
            
            <div class="message error-message" id="error-message"></div>
            <div class="message success-message" id="success-message"></div>
        </form>
        
        <div class="footer">
            <p>
                <svg class="security-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22S8 18 8 12V7L12 5L16 7V12C16 18 12 22 12 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Secure connection to your test automation platform
            </p>
        </div>
    </div>

    <script>
        (function() {
            // Create floating elements
            function createFloatingElements() {
                const container = document.getElementById('floating-elements');
                for (let i = 0; i < 8; i++) {
                    const element = document.createElement('div');
                    element.className = 'floating-element';
                    element.style.left = Math.random() * 100 + '%';
                    element.style.animationDelay = Math.random() * 15 + 's';
                    element.style.animationDuration = (15 + Math.random() * 10) + 's';
                    container.appendChild(element);
                }
            }
            
            createFloatingElements();
            
            const vscode = acquireVsCodeApi();
            
            // Form submission handler
            document.getElementById('login-form').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                // Validate inputs
                if (!email || !password) {
                    showMessage('error', 'Please fill in all fields');
                    return;
                }
                
                if (!isValidEmail(email)) {
                    showMessage('error', 'Please enter a valid email address');
                    return;
                }
                
                // Show loading state
                setLoadingState(true);
                hideMessages();
                
                // Send login data to extension
                vscode.postMessage({
                    command: 'login',
                    email: email,
                    password: password
                });
            });
            
            // Handle messages from extension
            window.addEventListener('message', event => {
                const message = event.data;
                
                switch (message.command) {
                    case 'loginSuccess':
                        setLoadingState(false);
                        showMessage('success', message.text || 'Login successful! Connecting to Caffetest...');
                        
                        // Add success animation
                        document.querySelector('.login-container').style.transform = 'scale(0.95)';
                        document.querySelector('.login-container').style.opacity = '0.8';
                        
                        // Close the webview after a short delay
                        setTimeout(() => {
                            vscode.postMessage({
                                command: 'closeWebview'
                            });
                        }, 2000);
                        break;
                        
                    case 'loginFailure':
                        setLoadingState(false);
                        showMessage('error', message.text || 'Login failed. Please check your credentials and try again.');
                        
                        // Add shake animation for error
                        const container = document.querySelector('.login-container');
                        container.style.animation = 'shake 0.5s ease-in-out';
                        setTimeout(() => {
                            container.style.animation = '';
                        }, 500);
                        break;
                }
            });
            
            function setLoadingState(loading) {
                const button = document.getElementById('login-button');
                const buttonText = document.getElementById('button-text');
                const loader = document.getElementById('loader');
                
                if (loading) {
                    button.disabled = true;
                    button.classList.add('loading');
                    buttonText.style.opacity = '0';
                    loader.style.display = 'block';
                } else {
                    button.disabled = false;
                    button.classList.remove('loading');
                    buttonText.style.opacity = '1';
                    loader.style.display = 'none';
                }
            }
            
            function showMessage(type, text) {
                hideMessages();
                const messageElement = document.getElementById(type + '-message');
                messageElement.textContent = text;
                messageElement.style.display = 'block';
            }
            
            function hideMessages() {
                document.getElementById('error-message').style.display = 'none';
                document.getElementById('success-message').style.display = 'none';
            }
            
            function isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }
            
            // Add input animations
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.style.transform = 'translateY(-2px)';
                });
                
                input.addEventListener('blur', () => {
                    input.parentElement.style.transform = 'translateY(0)';
                });
            });
        })();
        
        // Add shake animation keyframe
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
